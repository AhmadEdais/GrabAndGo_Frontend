<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create account — Grab&amp;Go</title>
    <link rel="stylesheet" href="shared/styles.css" />
    <script defer src="shared/config.js"></script>
    <script defer src="shared/api.js"></script>
    <script defer src="register.js"></script>
  </head>

  <body>
    <div class="page">
      <!-- ── Header ── -->
      <header class="header">
        <button class="header__btn" id="btn-back">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 18 9 12 15 6" />
          </svg>
        </button>
        <span class="header__title">Create account</span>
        <div style="width: 40px"></div>
      </header>

      <!-- ── Main ── -->
      <main class="page-content page-content--no-nav">
        <!-- Logo -->
        <div class="logo-block">
          <div class="logo-icon">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="white"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
              <line x1="3" y1="6" x2="21" y2="6" />
              <path d="M16 10a4 4 0 0 1-8 0" />
            </svg>
          </div>
          <h1 class="logo-block__title">Create account</h1>
          <p class="logo-block__subtitle">Start your Grab&amp;Go journey</p>
        </div>

        <!-- Error alert -->
        <div class="alert-error" id="alert-error">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          <span id="alert-error-text">Something went wrong.</span>
        </div>

        <!-- Form -->
        <form id="register-form" novalidate>
          <!-- First name -->
          <div class="form-group">
            <label class="form-label" for="input-firstname">First name</label>
            <input
              class="form-input"
              id="input-firstname"
              type="text"
              placeholder="Ahmad"
              autocomplete="given-name"
            />
            <span class="form-error" id="error-firstname">
              Please enter your first name.
            </span>
          </div>

          <!-- Last name -->
          <div class="form-group">
            <label class="form-label" for="input-lastname">Last name</label>
            <input
              class="form-input"
              id="input-lastname"
              type="text"
              placeholder="Edais"
              autocomplete="family-name"
            />
            <span class="form-error" id="error-lastname">
              Please enter your last name.
            </span>
          </div>

          <!-- Email -->
          <div class="form-group">
            <label class="form-label" for="input-email">Email</label>
            <input
              class="form-input"
              id="input-email"
              type="email"
              placeholder="you@example.com"
              autocomplete="email"
              inputmode="email"
            />
            <span class="form-error" id="error-email">
              Please enter your email.
            </span>
          </div>

          <!-- Password -->
          <div class="form-group mb-8">
            <label class="form-label" for="input-password">Password</label>
            <input
              class="form-input"
              id="input-password"
              type="password"
              placeholder="••••••••"
              autocomplete="new-password"
            />
            <span class="form-error" id="error-password">
              Please enter a password.
            </span>
          </div>

          <!-- Submit -->
          <div style="margin-top: 32px" class="mb-32">
            <button class="btn-primary" id="btn-submit" type="submit">
              <span id="btn-submit-label">Create account</span>
              <div class="spinner hidden" id="btn-spinner"></div>
            </button>
          </div>
        </form>

        <!-- Footer link -->
        <p class="link-text mt-auto">
          Already have an account? <a href="login.html">Sign in</a>
        </p>
      </main>
    </div>
  </body>
</html>
